services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: enterpriseiq-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Lukm4nul_H4k33m
      POSTGRES_DB: EnterpriseIQ
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d EnterpriseIQ"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - enterpriseiq_network

  backend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend
    container_name: enterpriseiq-backend
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:Lukm4nul_H4k33m@postgres:5432/EnterpriseIQ?schema=public
    volumes:
      - backend_uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - enterpriseiq_network

  frontend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.frontend
    container_name: enterpriseiq-frontend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend
    networks:
      - enterpriseiq_network

volumes:
  postgres_data:
  backend_uploads:

networks:
  enterpriseiq_network:
    driver: bridge
